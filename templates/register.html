{% extends "base.html" %}

{% block title %}Register Node - Surplus to Service{% endblock %}

{% block content %}
<style>
    .auth-box {
        max-width: 400px;
        margin: 40px auto;
        background: white;
        padding: 32px;
        border-radius: 24px;
        border: 1px solid #eeebe3;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight:700; color:#6b705c; margin-bottom: 6px; text-transform: uppercase; }
    .form-control { width: 100%; padding: 12px; border: 2px solid #eeebe3; border-radius: 12px; box-sizing: border-box; }
    .btn { width: 100%; background: #3b7a57; color: white; padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 12px; }
</style>

<div class="auth-box">
    <h2 style="margin-top:0; text-align: center;">Register Distribution Node</h2>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Email Access Point</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn">Create Network Account</button>
    </form>
</div>
{% endblock %}
