{% extends "base.html" %}

{% block title %}Log Excess Asset - Surplus to Service{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 500px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #eeebe3;
        border-radius: 24px;
        padding: 32px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #6b705c;
        margin-bottom: 8px;
        text-transform: uppercase;
    }
    .form-control {
        width: 100%;
        padding: 12px;
        border: 2px solid #eeebe3;
        border-radius: 12px;
        box-sizing: border-box;
        background: #fbf9f4;
    }
    .form-control:focus {
        outline: none;
        border-color: #3b7a57;
    }
    .submit-btn {
        width: 100%;
        background: #3b7a57;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
    }
</style>

<div class="form-container">
    <h2 style="margin-top:0; margin-bottom: 24px;">Log Excess Surplus Batch</h2>
    <form action="{{ url_for('post') }}" method="POST">
        <div class="form-group">
            <label>Title / Resource Name</label>
            <input type="text" name="title" class="form-control" placeholder="e.g., Surplus Bakery Item Lot" required>
        </div>
        <div class="form-group">
            <label>Category Configuration</label>
            <select name="category" class="form-control">
                <option value="Produce">Produce</option>
                <option value="Bakery">Bakery</option>
                <option value="Meals">Meals</option>
            </select>
        </div>
        <div class="form-group">
            <label>Quantity Metric Mass (KG)</label>
            <input type="number" step="0.1" name="quantity" class="form-control" placeholder="0.0" required>
        </div>
        <button type="submit" class="submit-btn">Publish Batch Entry</button>
    </form>
</div>
{% endblock %}
