<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Surplus to Service{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Resets & Leaf Green Layout Theme Variables */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fbf9f4; /* Soft Cream Backing */
            color: #2c3531;
        }

        /* Top Navigation Header Framework */
        .navbar-container {
            background-color: #ffffff;
            border-bottom: 1px solid #eeebe3;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand-logo {
            font-size: 18px;
            font-weight: 700;
            color: #3b7a57; /* Leaf Green Accent */
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .navbar-links-group {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-link-item {
            color: #6b705c;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .nav-link-item:hover {
            color: #3b7a57;
        }

        .nav-logout-btn {
            color: #b23b3b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        /* Central App Structural Frame Enclosure */
        .main-viewport-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* System Alert Notification Blocks */
        .flash-messages-stack {
            margin-bottom: 24px;
        }

        .flash-alert {
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            border: 1px solid transparent;
        }

        .flash-success {
            background-color: rgba(59, 122, 87, 0.08);
            color: #3b7a57;
            border-color: rgba(59, 122, 87, 0.15);
        }

        .flash-danger {
            background-color: rgba(178, 59, 59, 0.08);
            color: #b23b3b;
            border-color: rgba(178, 59, 59, 0.15);
        }
    </style>
</head>
<body>

    <nav class="navbar-container">
        <a href="{{ url_for('home') }}" class="navbar-brand-logo">
            <i class="fa-solid fa-leaf"></i> Surplus to Service
        </a>
        <div class="navbar-links-group">
            <a href="{{ url_for('home') }}" class="nav-link-item">Home</a>
            <a href="{{ url_for('browse') }}" class="nav-link-item">Browse Inventory</a>
            <a href="{{ url_for('post') }}" class="nav-link-item">Post Excess</a>
            <a href="{{ url_for('dashboard') }}" class="nav-link-item">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="nav-logout-btn"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </nav>

    <main class="main-viewport-wrapper">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages-stack">
                    {% for category, message in messages %}
                        <div class="flash-alert flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
