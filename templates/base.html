<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Surplus to Service{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #fbf9f4;
            color: #2c3531;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #eeebe3;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-size: 18px;
            font-weight: 700;
            color: #3b7a57;
            text-decoration: none;
            text-transform: uppercase;
        }
        .navbar-links {
            display: flex;
            gap: 24px;
        }
        .nav-item {
            color: #6b705c;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .nav-item:hover {
            color: #3b7a57;
        }
        .main-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
            box-sizing: border-box;
        }
        .flash-container {
            margin-bottom: 24px;
        }
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .alert-success { background: rgba(59, 122, 87, 0.1); color: #3b7a57; }
        .alert-danger { background: rgba(178, 59, 59, 0.1); color: #b23b3b; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="navbar-brand">
            <i class="fa-solid fa-leaf"></i> Surplus to Service
        </a>
        <div class="navbar-links">
            <a href="{{ url_for('home') }}" class="nav-item">Home</a>
            <a href="{{ url_for('browse') }}" class="nav-item">Browse</a>
            <a href="{{ url_for('post') }}" class="nav-item">Post Excess</a>
            <a href="{{ url_for('dashboard') }}" class="nav-item">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="nav-item" style="color: #b23b3b;">Logout</a>
        </div>
    </nav>

    <main class="main-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-container">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
