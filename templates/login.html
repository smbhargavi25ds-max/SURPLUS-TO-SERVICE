{% extends "base.html" %}

{% block title %}Log In - Surplus to Service{% endblock %}

{% block content %}
<style>
    /* Premium Entry Scale and Fade Animation */
    @keyframes snappyFadeIn {
        0% {
            opacity: 0;
            transform: scale(0.96) translateY(15px);
        }
        100% {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    /* Full Page Layout Centering Containment */
    .viewport-center-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 65vh;
        width: 100%;
        padding: 20px 0;
    }

    /* Off-White Login Card over Cream Canvas */
    .auth-card-panel {
        background: #ffffff; /* Off-white surface */
        border: 1px solid #eeebe3; /* Soft beige outline */
        border-radius: 24px;
        padding: 40px 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(59, 122, 87, 0.04), 0 1px 3px rgba(0, 0, 0, 0.01);
        text-align: center;
        animation: snappyFadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .auth-card-panel h2 {
        font-size: 22px;
        font-weight: 700;
        color: #2c3531; /* Deep forest charcoal */
        letter-spacing: -0.5px;
        margin-bottom: 6px;
        text-transform: uppercase;
    }

    .auth-card-panel p {
        color: #6b705c; /* Muted olive-beige */
        font-size: 14px;
        margin-bottom: 32px;
    }

    .form-field-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-field-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #6b705c;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
    }

    /* Input Field Configured with Custom Beige Tone */
    .input-field-control {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #eeebe3;
        border-radius: 12px;
        font-size: 15px;
        color: #2c3531;
        background-color: #fbf9f4; /* Light Cream background */
        transition: all 0.2s ease-in-out;
        box-sizing: border-box;
    }

    .input-field-control:focus {
        outline: none;
        border-color: #3b7a57; /* Leaf Green Focus */
        background-color: #ffffff;
        box-shadow: 0 0 0 5px rgba(59, 122, 87, 0.12);
    }

    /* Leaf Green Action Button with Dynamic Elastic Hover */
    .action-submit-btn {
        width: 100%;
        background: linear-gradient(135deg, #3b7a57 0%, #2d5e43 100%);
        color: #ffffff;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 4px 12px rgba(59, 122, 87, 0.18);
        margin-top: 10px;
        box-sizing: border-box;
    }

    .action-submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(59, 122, 87, 0.3);
        letter-spacing: 0.3px;
    }

    .auth-panel-footer {
        margin-top: 28px;
        font-size: 14px;
        color: #6b705c;
        border-top: 1px solid #eeebe3;
        padding-top: 20px;
    }

    .auth-panel-footer a {
        color: #3b7a57;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    .auth-panel-footer a:hover {
        color: #2d5e43;
        text-decoration: underline;
    }
</style>

<div class="viewport-center-container">
    <div class="auth-card-panel">
        <h2>Surplus to Service</h2>
        <p>Log in to your account</p>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-field-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" class="input-field-control" placeholder="Enter your email" required autocomplete="email">
            </div>
            
            <div class="form-field-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="action-submit-btn">Log in</button>
        </form>
        
        <div class="auth-panel-footer">
            No account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
