{% extends "base.html" %}

{% block title %}User Dashboard - Surplus to Service{% endblock %}

{% block content %}
<style>
    /* Layout Entry Motion Wave */
    @keyframes dashboardFade {
        from {
            opacity: 0;
            transform: scale(0.99) translateY(10px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    /* Split Dashboard Grid Layout */
    .dashboard-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 32px;
        align-items: start;
        animation: dashboardFade 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
